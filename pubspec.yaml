name: chennai_bus_crowding
description: Chennai Bus Crowding Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.6
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  connectivity_plus: ^6.0.3

  flutter_native_splash: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

# Combine everything under ONE flutter: key
flutter:
  uses-material-design: true
  assets:
    - lib/data/model_rules.json

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#5ce1e6"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#5ce1e6"
  image: assets/icon/app_icon.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center